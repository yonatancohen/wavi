name: Deploy API → Railway

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "Dockerfile"
      - "railway.toml"
  workflow_dispatch:

jobs:
  deploy:
    name: Railway deploy
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: railway up --detach --service wavi-api --environment production
