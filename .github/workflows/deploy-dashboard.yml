name: Deploy Dashboard → Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Vercel deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build via Vercel CLI
        run: npx vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        id: vercel
        run: |
          set -euo pipefail
          DEPLOY_OUT=$(npx vercel deploy --prod --yes --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$DEPLOY_OUT"
          URL=$(echo "$DEPLOY_OUT" | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | tail -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not parse Vercel deploy URL"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "$URL" > .deploy-dashboard-url
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Set DASHBOARD_URL on Railway (CORS)
        if: steps.vercel.outputs.url != ''
        run: |
          npm install -g @railway/cli@5.2.0
          railway variable set "DASHBOARD_URL=${{ steps.vercel.outputs.url }}" --service wavi-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: apps/api
